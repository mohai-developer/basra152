<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>واحة الهدوء المتجددة 🌲</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            display: flex;
            height: 100vh;
            touch-action: none;
            font-family: 'Segoe UI', sans-serif;
        }

        /* خلفية تتغير تلقائياً */
        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* الرابط يجلب صورة طبيعية عشوائية في كل مرة */
            background-image: url('https://source.unsplash.com/featured/?nature,landscape,peaceful');
            background-size: cover;
            background-position: center;
            filter: brightness(0.5); /* تعتيم خفيف للراحة */
            z-index: -1;
            transition: opacity 1s ease-in;
        }

        #score-board {
            position: absolute;
            top: 50px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.05));
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            /* سرعة أبطأ كما طلبت (12 ثانية للصعود) */
            animation: floatUp 12s infinite linear;
            cursor: pointer;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.8); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-20vh) scale(1.1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <div id="score-board">النقاط: <span id="score">0</span></div>

    <script>
        let score = 0;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // صوت رنين اليوجا (Zen Chime)
        function playYogaSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine';
            // ترددات هارمونية مريحة
            const frequencies = [440, 523.25, 659.25, 783.99]; 
            const freq = frequencies[Math.floor(Math.random() * frequencies.length)];
            
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.5);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        function createBubble() {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 60 + 40 + 'px';
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * (window.innerWidth - 60) + 'px';
            
            document.body.appendChild(bubble);
            
            bubble.addEventListener('pointerdown', () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                playYogaSound();
                score++;
                document.getElementById('score').innerText = score;
                
                // تأثير تلاشي ناعم عند الفرقعة
                bubble.style.transition = 'all 0.4s ease';
                bubble.style.transform = 'scale(1.5)';
                bubble.style.opacity = '0';
                setTimeout(() => bubble.remove(), 400);
            });

            setTimeout(() => { if(bubble.parentNode) bubble.remove(); }, 12000);
        }

        // إنشاء بالونات بمعدل هادئ
        setInterval(createBubble, 1500);

        // لتغيير الصورة في كل مرة يفتح فيها الرابط، نضطر لإضافة رقم عشوائي للرابط
        window.onload = () => {
            const bg = document.getElementById('bg-image');
            bg.style.backgroundImage = `url('https://picsum.photos/${window.innerWidth}/${window.innerHeight}?nature,water&sig=${Math.random()}')`;
        };
    </script>
</body>
</html>
