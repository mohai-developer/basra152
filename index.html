<title>لعبة باصرة 152</title>

<style>
:root{--bg-color:#0e5d32;--card-width:85px;--card-height:120px;}
@media(max-width:600px){:root{--card-width:65px;--card-height:95px;}}
* {box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;padding:0;background-color:var(--bg-color);font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden;user-select:none;display:flex;flex-direction:column;height:100vh;}

/* زر التثبيت - وضعته في مكان لا يغطي أي شيء من اللعبة */
#pwa-install-btn {
    display: none;
    position: fixed;
    top: 5px;
    left: 5px;
    z-index: 10001;
    background: #f1c40f;
    color: #2c3e50;
    border: 1px solid #fff;
    padding: 5px 10px;
    border-radius: 15px;
    font-weight: bold;
    font-size: 11px;
    cursor: pointer;
}

#game-container{flex:1;position:relative;width:100%;max-width:1000px;margin:0 auto;}
.area{position:absolute;width:100%;display:flex;justify-content:center;align-items:center;transition:all 0.3s ease;}
#cpu-area{top:10%;}
#table-area{top:50%;transform:translateY(-50%);flex-wrap:wrap;gap:10px;padding:20px;}
#user-area{bottom:10%;gap:10px;}
.card{width:var(--card-width);height:var(--card-height);background-color:white;border-radius:8px;position:relative;display:flex;justify-content:center;align-items:center;font-size:24px;font-weight:bold;box-shadow:0 4px 8px rgba(0,0,0,0.3);cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;background-size:cover;background-position:center;}
.card.back{background-color:#2c3e50;background-image:url('https://www.transparenttextures.com/patterns/carbon-fibre.png');}
.card:hover{transform:translateY(-10px);box-shadow:0 8px 16px rgba(0,0,0,0.5);}
.card.red{color:#e74c3c;}
.card.black{color:#2c3e50;}
.suit-top-left{position:absolute;top:5px;left:5px;font-size:16px;}
.suit-bottom-right{position:absolute;bottom:5px;right:5px;font-size:16px;transform:rotate(180deg);}
#controls{position:absolute;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;}
button{padding:10px 20px;font-size:16px;cursor:pointer;background-color:#f1c40f;border:none;border-radius:5px;font-weight:bold;color:#2c3e50;box-shadow:0 4px 0 #d4ac0d;}
button:active{transform:translateY(2px);box-shadow:0 2px 0 #d4ac0d;}
#scoreboard{position:absolute;top:20px;right:20px;background:rgba(0,0,0,0.5);color:white;padding:10px;border-radius:8px;font-size:14px;text-align:right;}
#message-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:white;padding:20px 40px;border-radius:10px;font-size:24px;display:none;z-index:100;}
</style>
</head>
<body>

<button id="pwa-install-btn" onclick="installApp()">📲 تثبيت</button>

<div id="game-container">
  <div id="cpu-area" class="area"></div>
  <div id="table-area" class="area"></div>
  <div id="user-area" class="area"></div>
  <div id="message-box"></div>
  <div id="scoreboard">
    <div>الكمبيوتر: <span id="cpu-score">0</span> (بواصر: <span id="cpu-basras">0</span>)</div>
    <div>أنت: <span id="user-score">0</span> (بواصر: <span id="user-basras">0</span>)</div>
    <div id="cards-left" style="margin-top:5px;font-size:12px;color:#ccc;">الأوراق المتبقية: 52</div>
  </div>
  <div id="controls">
    <button onclick="resetGame()">لعبة جديدة</button>
  </div>
</div>
