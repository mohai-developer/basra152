<title>باصرة 152 - نسخة المحترفين</title>

<style>
/* سيتم الإبقاء على كافة تنسيقات CSS الأصلية كما هي */
:root {
    --bg-color: #0e5d32;
    --card-width: 85px;
    --card-height: 120px;
}
@media (max-width: 600px) {
    :root {
        --card-width: 65px;
        --card-height: 95px;
    }
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
    margin: 0; padding: 0;
    background-color: var(--bg-color);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
    user-select: none;
    display: flex; flex-direction: column; height: 100vh;
}

/* تنسيق زر الإضافة للشاشة الرئيسية */
#pwa-install-btn {
    display: none; /* مخفي افتراضياً ويظهر برمجياً */
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 9999;
    background: rgba(255, 255, 255, 0.9);
    color: #0e5d32;
    border: 2px solid #fff;
    padding: 8px 15px;
    border-radius: 25px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    font-size: 14px;
}

/* ... بقية تنسيقات CSS الأصلية من ملفك (توضع هنا) ... */
#game-container { flex: 1; position: relative; width: 100%; max-width: 1000px; margin: 0 auto; }
/* (أكمل بقية التنسيقات من كودك الأصلي) */
</style>
</head>
<body>

<button id="pwa-install-btn">📲 إضافة للشاشة الرئيسية</button>

<div id="game-container">
    </div>

<script>
// ---------------------------------------------------------
// الجزء الخاص بمنطق "إضافة للشاشة الرئيسية"
// ---------------------------------------------------------
let deferredPrompt;
const installBtn = document.getElementById('pwa-install-btn');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
});

installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') installBtn.style.display = 'none';
        deferredPrompt = null;
    } else {
        // تنبيه خاص لمستخدمي آيفون (سفاري لا يدعم التثبيت البرمجي)
        alert("لتثبيت اللعبة على آيفون:\n1. اضغط على زر المشاركة أسفل الشاشة\n2. اختر 'إضافة إلى الشاشة الرئيسية' ➕");
    }
});

window.addEventListener('appinstalled', () => {
    installBtn.style.display = 'none';
});

// ---------------------------------------------------------
// منطق اللعبة الأصلي (باصرة 152) - لا تغيير هنا
// ---------------------------------------------------------

/* (هنا يتم وضع كامل كود الـ Javascript الخاص باللعبة، الذكاء الاصطناعي، والأصوات كما هي في ملفك) */

</script>
</body>
